name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack & Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.9.4 --activate
          yarnPath="$(corepack which yarn)"
          echo "Using Yarn at: ${yarnPath}"
          "${yarnPath}" -v
          "${yarnPath}" config get nodeLinker

      - name: Install deps (immutable)
        run: |
          "$(corepack which yarn)" install --immutable

      - name: Build & export
        run: |
          "$(corepack which yarn)" build
          touch out/.nojekyll

      - name: Ensure lockfile didn't change
        run: |
          git diff --exit-code -- yarn.lock

      - uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
